<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="2026 釜山旅行的航班、住宿、每日行程與景點地圖">
<title>釜山之旅 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #fff0f5; --card: #fffafd; --ink: #5d4048; --sub: #b08595;
    --accent: #e75480; --accent-soft: #ffe0ec; --warn-bg: #fff3e6; --warn-ink: #c2703d;
    --line: #ffd6e5;
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 16px; }

  header { background: linear-gradient(135deg, #ff9ebb, #e75480); color: #fff; padding: 28px 16px; text-align: center; }
  header h1 { font-size: 1.7rem; letter-spacing: .05em; text-shadow: 0 2px 0 rgba(0,0,0,.08); }
  header .sub { opacity: .95; font-size: .95rem; margin-top: 6px; }
  header .ribbon { display: inline-block; background: #fff; color: #e75480; font-weight: 800; font-size: .85rem; border-radius: 999px; padding: 3px 18px; margin-top: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  .lock-area { margin-top: 10px; font-size: .82rem; }
  .link-button { border: 0; padding: 0; background: transparent; color: #fff; text-decoration: underline; cursor: pointer; font: inherit; }
  button:focus-visible, a:focus-visible { outline: 3px solid #5b21b6; outline-offset: 3px; }
  .note-row { padding: 3px 0; }
  .card-note { margin-top: 6px; }

  nav { position: sticky; top: 0; z-index: 1000; background: var(--card); border-bottom: 1px solid var(--line); display: flex; overflow-x: auto; }
  nav button { flex: 1; min-width: 90px; padding: 12px 8px; border: none; background: none; font-size: .95rem; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  section.tab { display: none; }
  section.tab.active { display: block; }

  .card { background: var(--card); border: 2px dashed var(--line); border-radius: 20px; padding: 16px; margin: 14px 0; box-shadow: 0 3px 10px rgba(231, 84, 128, .07); }
  .card h2 { font-size: 1.05rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: .72rem; background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 999px; font-weight: 700; }
  .warn { background: var(--warn-bg); color: var(--warn-ink); border: 2px dashed #ffc999; }

  .flight-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; flex-wrap: wrap; }
  .flight-time { font-size: 1.4rem; font-weight: 800; }
  .flight-arrow { color: var(--sub); flex: 1; text-align: center; border-bottom: 2px dotted var(--line); position: relative; min-width: 60px; font-size: .8rem; padding-bottom: 4px; }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 14px; font-size: .9rem; }
  .kv dt { color: var(--sub); }
  .kv dd { font-weight: 600; }
  .muted { color: var(--sub); font-size: .85rem; }
  .transport-day { margin: 12px 0 4px; }
  .transport-item { padding: 7px 0 7px 8px; border-bottom: 1px dashed var(--line); }
  .transport-leg { font-weight: 700; font-size: .92rem; }

  .day-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
  .day-tabs button { border: 1px solid var(--line); background: var(--card); border-radius: 999px; padding: 6px 14px; cursor: pointer; white-space: nowrap; font-size: .88rem; }
  .day-tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; box-shadow: 0 2px 6px rgba(231,84,128,.3); }

  .handout { text-align: center; margin: 14px 0; }
  .handout img { max-width: 100%; border-radius: 20px; border: 3px solid #fff; box-shadow: 0 4px 16px rgba(231,84,128,.18); cursor: zoom-in; }
  .handout .cap { font-size: .8rem; color: var(--sub); margin-top: 6px; }

  .timeline { list-style: none; padding-left: 4px; }
  .timeline li { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
  .timeline li:last-child { border-bottom: none; }
  .timeline .t { font-weight: 800; color: var(--accent); min-width: 52px; }
  .timeline .n { color: var(--sub); font-size: .85rem; }
  .timeline span > .n { display: block; }

  #map { height: 62vh; min-height: 380px; border-radius: 14px; border: 1px solid var(--line); }
  .poi-list { margin-top: 10px; }
  .poi-list a { color: var(--accent); text-decoration: none; font-size: .85rem; }
  .poi-item { display: flex; justify-content: space-between; gap: 10px; padding: 8px 4px; border-bottom: 1px dashed var(--line); font-size: .92rem; flex-wrap: wrap; }

  footer { text-align: center; color: var(--sub); font-size: .8rem; padding: 24px 0 40px; }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1 id="trip-title"></h1>
    <div class="sub" id="trip-sub"></div>
    <div class="ribbon">💗 Phoebe & 柏儒 的旅遊手帳 💗</div>
    <div id="lock-area" class="lock-area" aria-live="polite"></div>
  </div>
</header>

<nav role="tablist" aria-label="旅行資訊分類">
  <button data-tab="overview" class="active" role="tab" aria-controls="tab-overview" aria-selected="true">📋 總覽</button>
  <button data-tab="itinerary" role="tab" aria-controls="tab-itinerary" aria-selected="false" tabindex="-1">🗓️ 每日行程</button>
  <button data-tab="map" role="tab" aria-controls="tab-map" aria-selected="false" tabindex="-1">🗺️ 地圖</button>
</nav>

<div class="wrap">
  <section class="tab active" id="tab-overview" role="tabpanel"></section>
  <section class="tab" id="tab-itinerary" role="tabpanel">
    <div class="day-tabs" id="day-tabs" role="tablist" aria-label="每日行程"></div>
    <div id="day-content"></div>
  </section>
  <section class="tab" id="tab-map" role="tabpanel">
    <div class="card">
      <h2>景點地圖 <span class="badge">點圖釘看導航連結</span></h2>
      <div id="map"></div>
      <div class="poi-list" id="poi-list"></div>
    </div>
  </section>
</div>

<footer>🌸 資料更新請編輯 data.js ・ 出發前記得再核對航班時間 🌸</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
